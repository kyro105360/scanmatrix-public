name: Run Jest Tests

on:
  push:
    branches:
      - mobile-app

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.17.0'
          cache: 'npm'  # cache node_modules

      # Step 3: Install dependencies in the correct subfolder
      - name: Install dependencies
        working-directory: BarcodeScannerApp/BarcodeMLApp
        run: |
          npm ci  # ensures exact versions from package-lock.json
          npx jest --clearCache  # clears Jest cache 

      # Step 4: Run Jest tests in the correct subfolder
      - name: Run tests
        working-directory: BarcodeScannerApp/BarcodeMLApp
        run: npm test
