name: Run Jest Tests

on:
  push:
    branches:
      - mobile-app

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Step 3: Install dependencies in subfolder
      - name: Install dependencies
        working-directory: ScanMatrix/BarcodeScannerApp/BarcodeML
        run: |
          npm ci                  # clean install
          npm install -g expo-cli 

      # Step 4: Run Jest tests in subfolder
      - name: Run tests
        working-directory: ScanMatrix/BarcodeScannerApp/BarcodeML
        run: npm test
