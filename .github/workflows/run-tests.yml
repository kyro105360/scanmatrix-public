name: Run Jest Tests

on:
  push:
    branches:
      - mobile-app

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Step 3: Debug folder structure
      - name: Debug repo structure
        run: ls -R

      # Step 4: Install dependencies in subfolder
      - name: Install dependencies
        working-directory: BarcodeScannerApp/BarcodeML
        run: |
          npm ci
          npm install -g expo-cli

      # Step 5: Run Jest tests in subfolder
      - name: Run tests
        working-directory: BarcodeScannerApp/BarcodeML
        run: npm test
